name: Bug report
description: Something is broken in List View
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Include Formidable and WordPress versions if you can.
  - type: input
    id: formidable-version
    attributes:
      label: Formidable Forms version
      placeholder: e.g. 6.31
    validations:
      required: true
  - type: input
    id: wp-version
    attributes:
      label: WordPress version
      placeholder: e.g. 6.8
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
